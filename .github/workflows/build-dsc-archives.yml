name: Build DSC archives
permissions:
  contents: write
on:
  workflow_dispatch:
  push: 
    #branches: [main]
    tags:
      - "releases/*"

env:
  dsc_folder: "src"
  artifact_name: "dsc-archives"
  vm_name: ""

jobs:
  build-dsc-archives:
    name: Build DSC archives
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
     
      # TODO: Consider caching deps: https://docs.github.com/en/actions/tutorials/build-and-test-code/powershell#caching-dependencies
      # - name: Setup PowerShell module cache
      #   if: false
      #   id: cacher
      #   uses: actions/cache@v5
      #   with:
      #     path: "~/.local/share/powershell/Modules"
      #     key: ${{ runner.os }}-mandatory-modules
      
      - name: Setup PowerShell
        #if: steps.cacher.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Az.Compute #, PSDesiredStateConfiguration

      - name: Install DSC modules
        shell: powershell
        env:
          scripts_folder: "setup"
        run: ${{ env.scripts_folder }}/Install-Modules.ps1 -repoPath "${{ github.workspace }}" -vmName "${{ env.vm_name }}" -copyCustomizedModules $true

      - name: Build DSC archives
        shell: powershell
        env:
          scripts_folder: "setup"
        run: |
          Remove-Item "${{ env.dsc_folder }}/*.zip" -ErrorAction SilentlyContinue
          ${{ env.scripts_folder }}/New-DscArchive.ps1 -vmName "${{ env.vm_name }}" -dscFolderPath "${{ env.dsc_folder }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact_name }}
          path: |
            ${{ env.dsc_folder }}/*.ps1
            ${{ env.dsc_folder }}/*.zip

  create-github-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build-dsc-archives
    if: startsWith(github.ref, 'refs/tags/releases/')
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{ env.artifact_name }}

      # example input (github.ref_name):  "releases/v2.0"
      # example output (release_version): "v2.0"
      - name: Extract version number from git tag name
        id: splittag
        env:
          git_tag: ${{ github.ref_name }}
        run: echo "release_version=`echo ${git_tag:9}`" >> $GITHUB_OUTPUT
      
      - run: echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT

      - run: |
          echo "${{ steps.splittag.outputs.release_version }}" 
          ls -alh .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: '${{ github.event.repository.name }} - ${{ steps.splittag.outputs.release_version }}'
          files: |
            *.ps1
            *.zip
          draft: true
          make_latest: true
