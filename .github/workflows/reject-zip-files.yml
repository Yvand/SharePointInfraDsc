name: Reject zip files in pull requests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  dsc_folder: "src"
  vm_name: ""

jobs:
  reject-zip-files:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Build DSC archives
        shell: powershell
        env:
          scripts_folder: "setup"
        run: |
          ${{ env.scripts_folder }}/Test-DscFiles.ps1 -vmName "${{ env.vm_name }}" -dscFolderPath "${{ env.dsc_folder }}"
      
      - name: Fail if the pull request contains zip files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: powershell
        run: |
          $zipFiles = git diff --name-only $env:BASE_SHA $env:HEAD_SHA | Where-Object { $_ -match '^src/.*\.zip$' }

          if ($zipFiles) {
            Write-Output "Zip files are not allowed in the src folder for pull requests."
            Write-Output $zipFiles
            exit 1
          }

          Write-Output "No zip files detected in the src folder for pull request changes."